<section class="section section-alt">
    <div class="container">

        </div>
        <div class="carousel-container">
            <div class="carousel-track" id="carousel">
                <div class="carousel-item"><img src="screenshots/screenshot-001.png" alt="Welcome"></div>

                <div class="carousel-item"><img src="screenshots/screenshot-008.png" alt="Stake"></div>
